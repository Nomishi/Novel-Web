<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bookshelf - WebDocTruyen</title>
    <link rel="stylesheet" th:href="@{/css/style.css(v=26)}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        .tabs {
            display: flex;
            gap: 1rem;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 1.5rem;
        }
        .tab {
            padding: 0.75rem 1.5rem;
            cursor: pointer;
            border-bottom: 2px solid transparent;
        }
        .tab.active {
            border-bottom-color: var(--primary-color);
            color: var(--primary-color);
            font-weight: 600;
        }
        .list-item {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            padding: 1rem;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            margin-bottom: 1rem;
        }
        .list-img {
            width: 80px;
            height: 120px;
            object-fit: cover;
            border-radius: 0.25rem;
            flex-shrink: 0;
            background: var(--border-color);
        }
    </style>
</head>
<body>
    <nav class="navbar" th:replace="~{index :: common-navbar}"></nav>
    <div class="container" style="padding: 2rem 1rem;">
        <h2>My Bookshelf</h2>
        <div class="tabs">
            <div class="tab active" onclick="showTab('recent')">Recently Read</div>
            <div class="tab" onclick="showTab('followed')">Followed Stories</div>
        </div>
        <div id="recent" class="tab-content">
            <div th:if="${#lists.isEmpty(progressList)}" class="card text-center text-muted">No recently read stories.
            </div>
            <div th:each="prog : ${progressList}" class="list-item">
                <img th:if="${prog.story.coverImage}" th:src="${prog.story.coverImage}" class="list-img" alt="Cover">
                <div th:unless="${prog.story.coverImage}"
                    class="list-img flex items-center justify-center text-center text-sm text-muted">No Cover</div>
                <div class="flex-col" style="flex-grow: 1;">
                    <a th:href="@{/story/{slug}(slug=${prog.story.slug})}" class="story-title"
                        style="font-size: 1.25rem;" th:text="${prog.story.title}">Story Title</a>
                    <div style="font-size: 0.875rem; color: var(--text-color); opacity: 0.8; margin-top: 0.25rem;"
                        th:text="'Last Read: Chapter ' + (${prog.currentChapter != null ? prog.currentChapter.chapterNumber : '?'}) + ' - ' + ${prog.scrollPercentage} + '%'">
                        Last Read...</div>
                </div>
                <div class="action flex gap-2">
                    <a th:if="${prog.currentChapter != null}" th:href="@{/reader/{id}(id=${prog.currentChapter.id})}"
                        class="btn btn-primary">Continue Reading</a>
                </div>
            </div>
        </div>
        <div id="followed" class="tab-content" style="display: none;">
            <div th:if="${#lists.isEmpty(bookshelf)}" class="card text-center text-muted">No followed stories.</div>
            <div th:each="item : ${bookshelf}" class="list-item">
                <img th:if="${item.story.coverImage}" th:src="${item.story.coverImage}" class="list-img" alt="Cover">
                <div th:unless="${item.story.coverImage}"
                    class="list-img flex items-center justify-center text-center text-sm text-muted">No Cover</div>
                <div class="flex-col" style="flex-grow: 1;">
                    <a th:href="@{/story/{slug}(slug=${item.story.slug})}" class="story-title"
                        style="font-size: 1.25rem;" th:text="${item.story.title}">Story Title</a>
                    <div style="font-size: 0.875rem; color: var(--text-color); opacity: 0.8; margin-top: 0.25rem;">
                        <span th:text="${item.story.status}">Status</span> • Notifications: <span
                            th:text="${item.notifyOnNewChapter ? 'On' : 'Off'}">On</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>
        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
            document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
            document.getElementById(id).style.display = 'block';
            event.target.classList.add('active');
        }

        function toggleUserMenu(event) {
            event.stopPropagation();
            const dropdown = document.getElementById('userDropdown');
            dropdown.classList.toggle('active');
        }

        // Đóng menu khi click ra ngoài
        document.addEventListener('click', function(e) {
            const dropdown = document.getElementById('userDropdown');
            if (dropdown && dropdown.classList.contains('active')) {
                if (!dropdown.contains(e.target)) {
                    dropdown.classList.remove('active');
                }
            }
            document.getElementById('userContextMenu').style.display = 'none';
        });
    </script>
</body>
</html>
