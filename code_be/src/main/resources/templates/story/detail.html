<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${story.title} + ' - WebDocTruyen'"></title>
    <link rel="stylesheet" th:href="@{/css/style.css(v=30)}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --border-color: #e2e8f0; /* Hoặc màu sắc bạn muốn */
        }
        .story-header {
            display: flex;
            gap: 3rem;
            margin-bottom: 3rem;
            background: #ffffff;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            border: 1px solid #f1f5f9;
        }

        @media (max-width: 768px) {
            .story-header {
                flex-direction: column;
                padding: 1.5rem;
                gap: 1.5rem;
            }
        }

        .story-cover-large {
            width: 280px;
            height: 400px;
            object-fit: cover;
            border-radius: 8px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.15), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            background-color: var(--border-color);
            flex-shrink: 0;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .story-cover-large:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.15), 0 10px 10px -5px rgba(0, 0, 0, 0.1);
        }

        .story-details {
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .story-details h1 {
            font-size: 2.25rem;
            font-weight: 800;
            margin-bottom: 1rem;
            color: #1e293b;
            line-height: 1.2;
        }

        .meta-badges {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .badge {
            background: #f1f5f9;
            border: 1px solid #e2e8f0;
            padding: 0.35rem 1rem;
            border-radius: 999px;
            font-size: 0.875rem;
            font-weight: 600;
            color: #475569;
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
        }

        .badge-status {
            background: #dbeafe;
            color: #1d4ed8;
            border-color: #bfdbfe;
        }

        .story-desc {
            font-size: 1.05rem;
            line-height: 1.7;
            color: #475569;
            margin-bottom: 2rem;
            flex-grow: 1;
        }

        /* Animated Buttons */
        .action-buttons {
            display: flex;
            gap: 1rem;
            margin-top: auto;
            flex-wrap: wrap;
        }

        .btn-animated {
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            text-decoration: none;
            cursor: pointer;
            border: none;
        }

        .btn-read {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
            box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.3);
        }

        .btn-read:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.4);
            color: white;
            /* Ensure text stays white */
        }

        .btn-read:active {
            transform: translateY(0);
        }

        .btn-outline {
            background-color: transparent;
            color: #475569;
            border: 2px solid #cbd5e1;
        }

        .btn-outline:hover {
            border-color: #3b82f6;
            color: #3b82f6;
            transform: translateY(-2px);
            background-color: #eff6ff;
        }

        /* Chapter List */
        .chapter-list {
            background: #ffffff;
            border-radius: 12px;
            border: 1px solid #f1f5f9;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.05);
            overflow: hidden;
            margin-bottom: 3rem;
        }

        .chapter-header {
            padding: 1.25rem 2rem;
            background: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
            font-weight: 700;
            font-size: 1.1rem;
            color: #1e293b;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .chapter-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            border-bottom: 1px solid #f1f5f9;
            transition: all 0.2s;
            color: #334155;
            text-decoration: none;
            font-weight: 500;
        }

        .chapter-item:last-child {
            border-bottom: none;
        }

        .chapter-item:hover {
            background-color: #f8fafc;
            color: #2563eb;
            padding-left: 2.25rem;
            /* Slight indent animation */
        }
    </style>
</head>

<body>

<nav class="navbar" th:replace="~{index :: common-navbar}"></nav>

<div class="container" style="padding: 2rem 1rem;">
    <div class="story-header">
        <img th:if="${story.coverImage}" th:src="${story.coverImage}" class="story-cover-large" alt="Cover">
        <div th:unless="${story.coverImage}" class="story-cover-large flex items-center justify-center">
            <span style="color: #94a3b8; font-weight: 500;">Chưa có ảnh bìa</span>
        </div>
        <div class="story-details">
            <h1 th:text="${story.title}">Tên Truyện</h1>
            <div class="meta-badges">
                <span class="badge"><i class="fas fa-pen-nib" style="color:#64748b;"></i> <span
                        th:text="${story.author}">Tác giả</span></span>
                <span class="badge badge-status" th:text="${story.status}">ONGOING</span>
                <span class="badge"><i class="fas fa-eye" style="color:#64748b;"></i> Lượt xem: <span
                        th:text="${story.views}">0</span></span>
                <span class="badge" style="color: #ea580c; border-color: #ffedd5; background: #fff7ed;"><i
                        class="fas fa-star"></i> <span th:text="${story.averageRating}">0.0</span></span>
                <span class="badge" style="color: #10b981; border-color: #d1fae5; background: #ecfdf5;"><i
                        class="fas fa-thumbs-up"></i> Đề cử: <span id="nominationCount"
                            th:text="${story.nominations != null ? story.nominations : 0}">0</span></span>
            </div>
            <div class="story-desc" th:utext="${story.description}">
                Mô tả truyện...
            </div>
            <div class="action-buttons">
                <a th:if="${not #lists.isEmpty(chapters)}"
                   th:href="@{/reader/{chapterId}(chapterId=${chapters[0].id})}" class="btn-animated btn-read">
                    <i class="fas fa-book-open"></i> Đọc Từ Đầu
                </a>
                <a th:if="${#lists.isEmpty(chapters)}" href="#" class="btn-animated btn-read"
                   style="opacity: 0.5; pointer-events: none;">
                    <i class="fas fa-lock"></i> Chưa có chương
                </a>

                <form th:if="${#authorization.expression('isAuthenticated()') and !isFollowed}"
                      th:action="@{/bookshelf/add}" method="post">
                    <input type="hidden" name="storyId" th:value="${story.id}">
                    <button type="submit" class="btn-animated btn-outline">
                        <i class="fas fa-bookmark"></i> Thêm Vào Tủ Sách
                    </button>
                </form>
                <form th:if="${#authorization.expression('isAuthenticated()') and isFollowed}"
                      th:action="@{/bookshelf/remove}" method="post">
                    <input type="hidden" name="storyId" th:value="${story.id}">
                    <button type="submit"
                            class="btn-animated btn-outline"
                            style="background:#dbeafe; color:#2563eb; border-color:#3b82f6;">
                        <i class="fas fa-check"></i> Đã Thêm Vào Tủ
                    </button>
                </form>

                <button th:if="${#authorization.expression('isAuthenticated()')}" type="button"
                        class="btn-animated btn-outline" onclick="nominateStory()"
                        style="color: #10b981; border-color: #10b981;">
                    <i class="fas fa-thumbs-up"></i> Đề Cử
                </button>
            </div>
        </div>
    </div>
    <div class="chapter-list">
        <div class="chapter-header">
            <i class="fas fa-list-ul" style="color: #3b82f6;"></i> Danh Sách Chương
        </div>
        <div th:if="${#lists.isEmpty(chapters)}"
             style="padding: 3rem; text-align: center; color: #64748b; font-style: italic;">
            Truyện hiện tại chưa có chương nào được đăng tải.
        </div>
        <a th:each="chapter : ${chapters}" th:href="@{/reader/{id}(id=${chapter.id})}" class="chapter-item">
            <span th:text="'Chương ' + ${chapter.chapterNumber} + ': ' + ${chapter.title}">Chương 1</span>
            <span class="badge" th:text="${#temporals.format(chapter.createdAt, 'dd-MM-yyyy')}"
                  style="font-size: 0.75rem; background: transparent; border: none; color: #94a3b8;">01-01-2026</span>
        </a>
    </div>
</div>

<script th:inline="javascript">
    function toggleUserMenu(event) {
        event.stopPropagation();
        const dropdown = document.getElementById('userDropdown');
        dropdown.classList.toggle('active');
    }

    // Đóng menu khi click ra ngoài
    document.addEventListener('click', function(e) {
        const dropdown = document.getElementById('userDropdown');
        if (dropdown && dropdown.classList.contains('active')) {
            if (!dropdown.contains(e.target)) {
                dropdown.classList.remove('active');
            }
        }
        document.getElementById('userContextMenu').style.display = 'none';
    });

    const storyId = /*[[${story.id}]]*/ null;
    function nominateStory() {
        if (!storyId) return;
        fetch(`/api/stories/${storyId}/nominate`, {
            method: 'POST'
        })
            .then(response => {
                if (response.ok) {
                    return response.json();
                } else if (response.status === 400) {
                    alert('Bạn không có đủ phiếu đề cử! Hãy đọc truyện 10s để nhận thêm nhé.');
                    throw new Error('Not enough tickets');
                } else {
                    alert('Có lỗi xảy ra hoặc bạn phải đăng nhập!');
                    throw new Error('Network response was not ok');
                }
            })
            .then(data => {
                document.getElementById('nominationCount').innerText = data;
                alert('Đề cử thành công!');
            })
            .catch(error => console.error('Error:', error));
    }
</script>

</body>

</html>
