<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Stories - WebDocTruyen</title>
    <link rel="stylesheet" th:href="@{/css/style.css(v=30)}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.5rem;
            margin-top: 2rem;
        }
        .story-card {
            transition: transform 0.2s;
            cursor: pointer;
            overflow: hidden;
        }
        .story-card:hover {
            transform: translateY(-4px);
        }
        .story-cover {
            width: 100%;
            height: 280px;
            object-fit: cover;
            border-bottom: 1px solid var(--border-color);
            background-color: var(--border-color);
        }
        .story-info {
            padding: 1rem;
        }
        .story-title {
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .story-meta {
            font-size: 0.875rem;
            color: var(--text-color);
            opacity: 0.7;
        }

        .filters {
            display: flex;
            gap: 2.5rem;
            margin-bottom: 2rem;
            background: #fff; /* Màu nền trắng như ảnh 1 */
            padding: 1.5rem;   /* Tăng padding để rộng rãi hơn */
            border-radius: 0.75rem; /* Bo góc nhiều hơn */
            border: 1px solid #e2e8f0; /* Viền mờ */
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); /* Thêm bóng đổ nhẹ */
            align-items: center;
        }

        /* Định dạng cho các ô input và select để giống ảnh 1 */
        .form-control {
            border: 1px solid #e2e8f0;
            padding: 0.6rem 3rem;
            border-radius: 0.5rem;
            outline: none;
            transition: 0.2s;
        }

        .form-control:focus {
            border-color: #63a6ff;
            box-shadow: 0 0 0 3px rgba(99, 166, 255, 0.2);
        }

        /* Định dạng nút Search */
        .btn-primary {
            background-color: #3b82f6; /* Màu xanh của nút Search */
            color: white;
            border: none;
            padding: 0.6rem 2.5rem;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-primary:hover {
            background-color: #2563eb;
        }
    </style>
</head>
<body>
    <nav class="navbar" th:replace="~{index :: common-navbar}"></nav>
    <div class="container" style="padding: 2rem 1rem;">
        <div class="flex justify-between items-center mb-4">
            <h2>All Stories</h2>
        </div>
        <form th:action="@{/stories}" method="get" class="filters">
            <input type="text" name="keyword" th:value="${keyword}" class="form-control" placeholder="Search by title or author..."
                style="max-width: 300px;">
            <select class="form-control" style="max-width: 200px;">
                <option value="">All Genres</option>
            </select>
            <button type="submit" class="btn btn-primary">Search</button>
        </form>
        <div th:if="${#lists.isEmpty(stories)}" class="card text-center" style="padding: 3rem;">
            <h3>No stories found</h3>
            <p>Check back later or try adjusting your search filters.</p>
        </div>
        <div class="grid" th:unless="${#lists.isEmpty(stories)}">
            <a th:each="story : ${stories}" th:href="@{/story/{slug}(slug=${story.slug})}" class="card story-card"
                style="padding: 0;">
                <img th:if="${story.coverImage}" th:src="${story.coverImage}" class="story-cover" alt="Cover">
                <div th:unless="${story.coverImage}" class="story-cover flex items-center justify-center">
                    <span style="color: #94a3b8;">No Cover</span>
                </div>
                <div class="story-info">
                    <div class="story-title" th:text="${story.title}">Story Title</div>
                    <div class="story-meta flex justify-between">
                        <span th:text="${story.author}">Author</span>
                        <span th:text="${story.status}">Status</span>
                    </div>
                </div>
            </a>
        </div>
        
        <!-- Pagination block -->
        <div th:if="${page != null and page.totalPages > 1}" class="pagination" style="margin-top: 2rem; display: flex; justify-content: center; gap: 0.5rem; align-items: center;">
            <a th:if="${page.hasPrevious()}" 
               th:href="@{/stories(keyword=${keyword}, page=${page.number - 1})}" 
               class="btn" style="padding: 0.5rem 1rem; border: 1px solid var(--border-color); border-radius: 4px; text-decoration: none; color: var(--text-color);">Trước</a>
            
            <span style="padding: 0.5rem 1rem; background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 4px; font-weight: 500;">
                Trang <span th:text="${page.number + 1}">1</span> / <span th:text="${page.totalPages}">10</span>
            </span>
            
            <a th:if="${page.hasNext()}" 
               th:href="@{/stories(keyword=${keyword}, page=${page.number + 1})}" 
               class="btn" style="padding: 0.5rem 1rem; border: 1px solid var(--border-color); border-radius: 4px; text-decoration: none; color: var(--text-color);">Tiếp</a>
        </div>
        <div th:if="${page != null}" style="text-align: center; margin-top: 1rem; color: #718096; font-size: 0.875rem;">
            Tổng cộng: <span th:text="${page.totalElements}">0</span> truyện
        </div>
    </div>
<script>
    function toggleUserMenu(event) {
        event.stopPropagation();
        const dropdown = document.getElementById('userDropdown');
        dropdown.classList.toggle('active');
    }

    // Đóng menu khi click ra ngoài
    document.addEventListener('click', function(e) {
        const dropdown = document.getElementById('userDropdown');
        if (dropdown && dropdown.classList.contains('active')) {
            if (!dropdown.contains(e.target)) {
                dropdown.classList.remove('active');
            }
        }
        document.getElementById('userContextMenu').style.display = 'none';
    });
</script>
</body>
</html>
