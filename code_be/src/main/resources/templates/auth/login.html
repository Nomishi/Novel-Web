<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auth - WebDocTruyen</title>
    <link rel="stylesheet" th:href="@{/css/style.css(v=30)}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css?family=Montserrat:400,800');
        * { box-sizing: border-box; margin:0; padding:0; }
        body {
            background: #e3e0f8; /* tím pastel nhạt nhưng đậm hơn */
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            font-family: 'Montserrat', sans-serif;
            height: 100vh;
        }
        h1 { font-weight: 800; color: #3a2d70; } /* tím đậm pastel */
        h2, p { text-align: center; color: #4b4180; } /* tím đậm */
        p { font-size: 14px; line-height: 20px; margin: 20px 0 30px; }
        span { font-size: 12px; color: #444; }
        a { color: #ff6b81; font-size: 14px; text-decoration: none; margin: 15px 0; font-weight: 600; } /* hồng pastel đậm */
        button {
            border-radius: 12px;
            border: none;
            background-color: #63a6ff; /* xanh pastel đậm hơn */
            color: #fff;
            font-size: 14px;
            font-weight: 700;
            padding: 12px 45px;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { background-color: #3f8fff; } /* đậm hơn hover */
        button:focus { outline: none; }
        button.ghost {
            background-color: transparent;
            border: 1px solid #fff;
        }
        form {
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0 50px;
            height: 100%;
            text-align: center;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.12);
        }
        input {
            background-color: #e6e5ff; /* pastel sáng vừa phải */
            border: 1px solid #bfc0ff;
            padding: 12px 15px;
            margin: 8px 0;
            width: 100%;
            border-radius: 8px;
            transition: 0.3s;
            color: #2c2a50;
        }
        input:focus { border-color: #63a6ff; }
        .container {
            background-color: #fff;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
            width: 768px;
            max-width: 95%;
            min-height: 480px;
            height: 480px;
        }
        .form-container { position: absolute; top: 0; height: 100%; transition: all 0.6s ease-in-out; }
        .sign-in-container { left: 0; width: 50%; z-index: 2; }
        .container.right-panel-active .sign-in-container { transform: translateX(100%); }
        .sign-up-container { left: 0; width: 50%; opacity: 0; z-index: 1; }
        .container.right-panel-active .sign-up-container {
            transform: translateX(100%);
            opacity: 1;
            z-index: 5;
            animation: show 0.6s;
        }
        @keyframes show { 0%,49.99% { opacity: 0; z-index:1; } 50%,100% { opacity:1; z-index:5; } }
        .overlay-container { position: absolute; top: 0; left: 50%; width: 50%; height: 100%; overflow: hidden; transition: transform 0.6s ease-in-out; z-index: 100; }
        .container.right-panel-active .overlay-container { transform: translateX(-100%); }
        .overlay {
            background: linear-gradient(to right, #ff9ebd, #63a6ff); /* pastel hồng → xanh đậm vừa phải */
            color: #fff;
            position: relative;
            left: -100%;
            height: 100%;
            width: 200%;
            transform: translateX(0);
            transition: transform 0.6s ease-in-out;
        }
        .container.right-panel-active .overlay { transform: translateX(50%); }
        .overlay-panel {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            padding: 0 40px;
            text-align: center;
            top:0;
            height:100%;
            width:50%;
            transform: translateX(0);
            transition: transform 0.6s ease-in-out;
        }
        .overlay-left { transform: translateX(-20%); }
        .container.right-panel-active .overlay-left { transform: translateX(0); }
        .overlay-right { right:0; transform: translateX(0); }
        .container.right-panel-active .overlay-right { transform: translateX(20%); }
        .home-link { position: absolute; top: 20px; left: 20px; font-weight: bold; color: #63a6ff; text-decoration: none; z-index: 1000; }
        .alert { width: 100%; padding: 10px; border-radius: 6px; margin-bottom: 10px; font-size: 13px; text-align: left; border-left: 4px solid #e53e3e; color: #b91c1c; background: #fee2e2; }
        .alert-success { color: #15803d; background: #dcfce3; border-color: #22c55e; }

        /* Xóa bỏ đoạn .btn-forgot cũ và thay bằng đoạn này */
        .btn-forgot {
            color: #ff6b81 !important;
            font-size: 13px;
            font-weight: 600;
            text-decoration: none;
            margin: 10px 0 !important;
            display: block !important;
            position: relative !important;
            z-index: 9999 !important; /* Đảm bảo nằm trên mọi lớp phủ */
            cursor: pointer !important;
            width: fit-content;
        }

        .btn-forgot:hover {
            color: #3f8fff !important;
            text-decoration: underline;
        }

        /* Đảm bảo form không đè lên các thành phần con */
        .form-container form {
            overflow: visible !important;
        }

    </style>
</head>
<body>
    <a th:href="@{/}" class="home-link"><i class="fas fa-arrow-left"></i> Trang Chủ</a>
    <div class="container" id="container">
        <div class="form-container sign-up-container">
            <form th:action="@{/register}" method="post">
                <h1>Đăng Ký</h1>
                <span>Sử dụng email của bạn</span>
                <div style="width: 100%;">
                    <div th:if="${param.mode != null and param.mode[0] == 'register' and error != null}" class="alert">
                        <span th:text="${error}"></span>
                    </div>
                </div>
                <input type="text" name="username" placeholder="Username" required />
                <input type="email" name="email" placeholder="Email" required />
                <input type="password" name="password" placeholder="Password" required />
                <button type="submit">Đăng Ký</button>
            </form>
        </div>
        <div class="form-container sign-in-container">
            <form th:action="@{/login}" method="post">
                <h1>Đăng Nhập</h1>
                <span>Sử dụng tài khoản của bạn</span>
                <div style="width: 100%;">
                    <div th:if="${param.error != null}" class="alert">Sai thông tin đăng nhập.</div>
                    <div th:if="${param.logout != null}" class="alert alert-success">Đăng xuất thành công.</div>
                    <div th:if="${success != null}" class="alert alert-success"><span th:text="${success}"></span></div>
                    <div th:if="${(param.mode == null or param.mode[0] != 'register') and error != null}" class="alert">
                        <span th:text="${error}"></span>
                    </div>
                </div>
                <input type="text" name="username" placeholder="Username" required />
                <input type="password" name="password" placeholder="Password" required />
                <a th:href="@{/forgot-password}" class="btn-forgot">Quên mật khẩu?</a>
                <button type="submit">Đăng Nhập</button>
            </form>
        </div>
        <div class="overlay-container">
            <div class="overlay">
                <div class="overlay-panel overlay-left">
                    <h1>Chào mừng trở lại!</h1>
                    <p>Đăng nhập ngay để tiếp tục đọc thể loại truyện yêu thích của bạn</p>
                    <button class="ghost" id="signIn">Đăng Nhập</button>
                </div>
                <div class="overlay-panel overlay-right">
                    <h1>Chào bạn mới!</h1>
                    <p>Đăng ký ngay để không bỏ lỡ những truyện độc quyền</p>
                    <button class="ghost" id="signUp">Đăng Ký</button>
                </div>
            </div>
        </div>
    </div>
    <script>
        const signUpButton = document.getElementById('signUp');
        const signInButton = document.getElementById('signIn');
        const container = document.getElementById('container');
        signUpButton.addEventListener('click', () => {
            container.classList.add("right-panel-active");
            const url = new URL(window.location);
            url.searchParams.set('mode', 'register');
            window.history.replaceState({}, '', url);
        });
        signInButton.addEventListener('click', () => {
            container.classList.remove("right-panel-active");
            const url = new URL(window.location);
            url.searchParams.delete('mode');
            window.history.replaceState({}, '', url);
        });
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('mode') === 'register') {
                container.classList.add("right-panel-active");
            }
        });
    </script>
</body>
</html>
