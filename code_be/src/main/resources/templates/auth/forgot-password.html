<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - WebDocTruyen</title>
    <link rel="stylesheet" th:href="@{/css/style.css(v=10)}">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--background-color);
        }
        .auth-card {
            width: 100%;
            max-width: 400px;
        }
        .auth-card h2 {
            text-align: center;
            margin-bottom: 0.5rem;
            color: var(--primary-color);
        }
        .auth-card p {
            text-align: center;
            margin-bottom: 1.5rem;
            color: var(--text-color);
            opacity: 0.8;
            font-size: 0.875rem;
        }
        .auth-links {
            margin-top: 1rem;
            text-align: center;
            font-size: 0.875rem;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="card auth-card">
            <h2>Reset Password</h2>
            <p>Enter your email address and we'll send you a link to reset your password.</p>
            <form th:action="@{/forgot-password}" method="post">
                <div class="form-group">
                    <label class="form-label" for="email">Email Address</label>
                    <input type="email" id="email" name="email" class="form-control" required autofocus>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Send Reset
                    Link</button>
            </form>
            <div class="auth-links">
                <a th:href="@{/login}">Back to Login</a>
            </div>
        </div>
    </div>
</body>
</html>
