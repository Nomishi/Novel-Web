<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - WebDocTruyen</title>
    <link rel="stylesheet" th:href="@{/css/style.css(v=30)}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <style>
        * { box-sizing: border-box; margin:0; padding:0; }

        body {
            background: #e3e0f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Montserrat', sans-serif;
            color: #3a2d70;
        }

        .auth-container {
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .auth-card {
            background: #fff;
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.12);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h2 {
            font-weight: 800;
            margin-bottom: 10px;
            color: #3a2d70;
        }

        p {
            font-size: 14px;
            color: #4b4180;
            margin-bottom: 25px;
        }

        input {
            background-color: #e6e5ff;
            border: 1px solid #bfc0ff;
            padding: 12px 15px;
            margin: 10px 0;
            width: 100%;
            border-radius: 8px;
            font-family: 'Montserrat', sans-serif;
            color: #2c2a50;
            transition: 0.3s;
        }

        input:focus {
            border-color: #63a6ff;
            outline: none;
        }

        button {
            width: 100%;
            margin-top: 15px;
            border-radius: 12px;
            border: none;
            background-color: #63a6ff;
            color: #fff;
            font-size: 14px;
            font-weight: 700;
            padding: 12px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: #3f8fff;
        }

        .auth-links {
            margin-top: 20px;
            font-size: 14px;
        }

        .auth-links a {
            color: #ff6b81;
            text-decoration: none;
            font-weight: 600;
        }

        .auth-links a:hover {
            text-decoration: underline;
        }

        .home-link {
            position: absolute;
            top: 20px;
            left: 20px;
            font-weight: bold;
            color: #63a6ff;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <a th:href="@{/}" class="home-link">← Trang Chủ</a>

    <div class="auth-container">
        <div class="auth-card">
            <h2>Quên Mật Khẩu</h2>
            <p>Nhập email để nhận link đặt lại mật khẩu</p>

            <form th:action="@{/forgot-password}" method="post">
                <input type="email" name="email" placeholder="Email của bạn" required autofocus>
                <button type="submit">Gửi Link</button>
            </form>

            <div class="auth-links">
                <a th:href="@{/login}">Quay lại đăng nhập</a>
            </div>
        </div>
    </div>

</body>
</html>
