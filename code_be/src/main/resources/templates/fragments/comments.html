<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <style>
        .comment-section {
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border-color);
        }
        .comment-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            padding: 1rem;
            margin-bottom: 1rem;
        }
        .comment-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
        }
        .comment-author {
            font-weight: 600;
            color: var(--primary-color);
        }
        .comment-date {
            font-size: 0.875rem;
            color: var(--text-color);
            opacity: 0.7;
        }
        .comment-body {
            line-height: 1.5;
            margin-bottom: 0.5rem;
        }
        .comment-actions {
            font-size: 0.875rem;
        }
        .comment-actions a {
            cursor: pointer;
            color: var(--text-color);
            opacity: 0.7;
            text-decoration: none;
        }
        .comment-actions a:hover {
            opacity: 1;
            color: var(--primary-color);
        }
        .replies {
            margin-left: 2rem;
            margin-top: 1rem;
            border-left: 2px solid var(--border-color);
            padding-left: 1rem;
        }
        .reply-form {
            display: none;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <div th:fragment="commentNode(comment, storyId, chapterId)">
        <div class="comment-card">
            <div class="comment-header">
                <span class="comment-author" th:text="${comment.user.displayName}">User</span>
                <span class="comment-date"
                    th:text="${#temporals.format(comment.createdAt, 'dd-MM-yyyy HH:mm')}">Date</span>
            </div>
            <div class="comment-body" th:text="${comment.content}">Content</div>
            <div th:if="${#authorization.expression('isAuthenticated()')}" class="comment-actions">
                <a th:onclick="'toggleReplyForm(' + ${comment.id} + ')'">Reply</a>
                <form th:id="'reply-form-' + ${comment.id}" class="reply-form" th:action="@{/comment/add}"
                    method="post">
                    <input type="hidden" name="storyId" th:value="${storyId}">
                    <input type="hidden" th:if="${chapterId != null}" name="chapterId" th:value="${chapterId}">
                    <input type="hidden" name="parentId" th:value="${comment.id}">
                    <div class="flex gap-2">
                        <input type="text" name="content" class="form-control" placeholder="Write a reply..." required>
                        <button type="submit" class="btn btn-primary">Post</button>
                    </div>
                </form>
            </div>
            <div class="replies" th:if="${not #lists.isEmpty(comment.replies)}">
                <th:block th:each="reply : ${comment.replies}">
                    <div
                        th:replace="~{fragments/comments :: commentNode(comment=${reply}, storyId=${storyId}, chapterId=${chapterId})}">
                    </div>
                </th:block>
            </div>
        </div>
    </div>
    <div th:fragment="commentScript">
        <script>
            function toggleReplyForm(commentId) {
                const form = document.getElementById('reply-form-' + commentId);
                form.style.display = form.style.display === 'block' ? 'none' : 'block';
            }
        </script>
    </div>
</body>
</html>
